<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Random Video Chat</title>
  <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
  <script src="https://unpkg.com/mqtt@5.3.4/dist/mqtt.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: system-ui, -apple-system, sans-serif; }
    body { background: #0f172a; color: #f8fafc; height: 100vh; display: flex; flex-direction: column; padding: 12px; gap: 12px; }

    header { display: flex; align-items: center; justify-content: space-between; background: #1e293b; padding: 12px 16px; border-radius: 8px; flex-wrap: wrap; gap: 8px; }
    .status-badge { font-size: 14px; font-weight: 600; color: #38bdf8; }
    .controls { display: flex; gap: 8px; }
    
    button { border: none; padding: 8px 16px; font-size: 14px; font-weight: 600; border-radius: 6px; cursor: pointer; transition: opacity 0.2s; }
    button:hover { opacity: 0.9; }
    .btn-end { background: #ef4444; color: #fff; }
    .btn-next { background: #22c55e; color: #fff; }

    .main-grid { display: flex; flex: 1; gap: 12px; overflow: hidden; }
    .video-container { flex: 2; display: grid; grid-template-rows: 1fr 1fr; gap: 12px; }
    .video-card { position: relative; background: #020617; border-radius: 8px; overflow: hidden; display: flex; align-items: center; justify-content: center; }
    video { width: 100%; height: 100%; object-fit: cover; }
    .video-label { position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,0.6); padding: 4px 8px; border-radius: 4px; font-size: 12px; }

    .chat-container { flex: 1; background: #1e293b; border-radius: 8px; display: flex; flex-direction: column; padding: 12px; gap: 8px; }
    .chat-messages { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; }
    .msg { padding: 8px 12px; border-radius: 6px; font-size: 14px; max-width: 85%; word-break: break-word; }
    .msg.me { background: #2563eb; align-self: flex-end; }
    .msg.them { background: #334155; align-self: flex-start; }
    .msg.system { background: transparent; color: #94a3b8; align-self: center; font-size: 12px; font-style: italic; }

    .typing-status { font-size: 12px; color: #38bdf8; font-style: italic; min-height: 16px; }
    .chat-input { display: flex; gap: 8px; }
    input[type="text"] { flex: 1; padding: 10px; border-radius: 6px; border: 1px solid #334155; background: #0f172a; color: #fff; outline: none; }
    .btn-send { background: #2563eb; color: #fff; }

    @media (min-width: 768px) { .video-container { grid-template-rows: none; grid-template-columns: 1fr 1fr; } }
    @media (max-width: 600px) { .main-grid { flex-direction: column; } }
  </style>
</head>
<body>

  <header>
    <div>
      <span style="color: #94a3b8; font-size: 14px;">Status: </span>
      <span id="status" class="status-badge">Initializing camera...</span>
    </div>
    <div class="controls">
      <button id="end-btn" class="btn-end" disabled>End Chat</button>
      <button id="next-btn" class="btn-next">Next Stranger ➔</button>
    </div>
  </header>

  <div class="main-grid">
    <div class="video-container">
      <div class="video-card">
        <span class="video-label">You</span>
        <video id="local-video" autoplay muted playsinline></video>
      </div>
      <div class="video-card">
        <span class="video-label">Stranger</span>
        <video id="remote-video" autoplay playsinline></video>
      </div>
    </div>

    <div class="chat-container">
      <h3 style="font-size: 15px; border-bottom: 1px solid #334155; padding-bottom: 8px;">Text Chat</h3>
      <div id="messages" class="chat-messages"></div>
      <div id="typing-indicator" class="typing-status"></div>
      <div class="chat-input">
        <input type="text" id="msg-input" placeholder="Say hello..." disabled>
        <button id="send-btn" class="btn-send" disabled>Send</button>
      </div>
    </div>
  </div>

  <script>
    const TOPIC = 'global-random-chat-v2/matchmaker';
    let localStream, peer, myId, mqttClient, activeCall, activeConn;
    let isConnected = false;
    let typingTimeout = null;

    const statusEl = document.getElementById('status');
    const localVideo = document.getElementById('local-video');
    const remoteVideo = document.getElementById('remote-video');
    const messagesEl = document.getElementById('messages');
    const typingIndicator = document.getElementById('typing-indicator');
    const msgInput = document.getElementById('msg-input');
    const sendBtn = document.getElementById('send-btn');
    const nextBtn = document.getElementById('next-btn');
    const endBtn = document.getElementById('end-btn');

    // Initialize Camera
    async function initCamera() {
      try {
        localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
        localVideo.srcObject = localStream;
        initPeer();
      } catch (err) {
        statusEl.textContent = 'Camera blocked! Ensure site is on HTTPS.';
        appendSystemMessage('Camera permission failed. Check browser settings.');
      }
    }

    // Initialize PeerJS
    function initPeer() {
      statusEl.textContent = 'Connecting to network...';
      peer = new Peer();

      peer.on('open', id => { myId = id; initMatchmaker(); });
      peer.on('call', call => { if (!isConnected) acceptIncomingCall(call); else call.close(); });
      peer.on('connection', conn => { if (!isConnected || activeConn === conn) setupDataConnection(conn); });
    }

    // MQTT Broker Matchmaking
    function initMatchmaker() {
      mqttClient = mqtt.connect('wss://broker.hivemq.com:8884/mqtt');
      mqttClient.on('connect', () => {
        mqttClient.subscribe(TOPIC);
        findMatch();
      });

      mqttClient.on('message', (topic, message) => {
        if (isConnected) return;
        try {
          const data = JSON.parse(message.toString());
          if (data.action === 'looking' && data.id !== myId) connectToStranger(data.id);
        } catch(e) {}
      });
    }

    function findMatch() {
      disconnectCurrent();
      statusEl.textContent = 'Searching for stranger...';
      appendSystemMessage('Looking for someone online...');
      if (mqttClient?.connected) mqttClient.publish(TOPIC, JSON.stringify({ action: 'looking', id: myId }));
    }

    function connectToStranger(targetId) {
      if (isConnected) return;
      isConnected = true;
      statusEl.textContent = 'Connecting...';
      setupDataConnection(peer.connect(targetId));
      setupCall(peer.call(targetId, localStream));
    }

    function acceptIncomingCall(call) {
      isConnected = true;
      call.answer(localStream);
      setupCall(call);
    }

    function setupCall(call) {
      activeCall = call;
      call.on('stream', stream => {
        remoteVideo.srcObject = stream;
        statusEl.textContent = 'Connected!';
        appendSystemMessage('Connected! Say hi.');
        toggleControls(true);
      });
      call.on('close', () => resetState('Stranger disconnected.'));
    }

    function setupDataConnection(conn) {
      activeConn = conn;
      conn.on('data', data => handleIncomingData(data));
      conn.on('close', () => resetState('Stranger left chat.'));
    }

    // Handle Messages & Typing Status
    function handleIncomingData(data) {
      if (data.type === 'text') {
        typingIndicator.textContent = '';
        appendMessage(data.text, 'them');
      } else if (data.type === 'typing') {
        typingIndicator.textContent = data.isTyping ? 'Stranger is typing...' : '';
      }
    }

    msgInput.addEventListener('input', () => {
      if (!activeConn) return;
      activeConn.send({ type: 'typing', isTyping: true });
      clearTimeout(typingTimeout);
      typingTimeout = setTimeout(() => {
        if (activeConn) activeConn.send({ type: 'typing', isTyping: false });
      }, 1500);
    });

    sendBtn.addEventListener('click', sendMessage);
    msgInput.addEventListener('keypress', e => { if (e.key === 'Enter') sendMessage(); });

    function sendMessage() {
      const text = msgInput.value.trim();
      if (!text || !activeConn) return;
      activeConn.send({ type: 'text', text: text });
      activeConn.send({ type: 'typing', isTyping: false });
      appendMessage(text, 'me');
      msgInput.value = '';
    }

    // End & Next Control Handlers
    endBtn.addEventListener('click', () => {
      disconnectCurrent();
      statusEl.textContent = 'Chat ended.';
      appendSystemMessage('You ended the chat.');
    });

    nextBtn.addEventListener('click', findMatch);

    function disconnectCurrent() {
      if (activeCall) activeCall.close();
      if (activeConn) activeConn.close();
      activeCall = null;
      activeConn = null;
      isConnected = false;
      remoteVideo.srcObject = null;
      typingIndicator.textContent = '';
      toggleControls(false);
    }

    function resetState(reason) {
      disconnectCurrent();
      statusEl.textContent = 'Disconnected';
      appendSystemMessage(reason);
    }

    function toggleControls(connected) {
      msgInput.disabled = !connected;
      sendBtn.disabled = !connected;
      endBtn.disabled = !connected;
    }

    function appendMessage(text, sender) {
      const div = document.createElement('div');
      div.className = `message ${sender}`;
      div.textContent = text;
      messagesEl.appendChild(div);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function appendSystemMessage(text) {
      const div = document.createElement('div');
      div.className = 'msg system';
      div.textContent = text;
      messagesEl.appendChild(div);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    initCamera();
  </script>
</body>
</html>
