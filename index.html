<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Random Video & Text Chat</title>
  <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
  <script src="https://unpkg.com/mqtt@5.3.4/dist/mqtt.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: system-ui, -apple-system, sans-serif; }
    body { background: #0b0f19; color: #f8fafc; min-height: 100vh; display: flex; flex-direction: column; padding: 10px; gap: 10px; }

    /* Header & Navigation */
    header { display: flex; flex-wrap: wrap; align-items: center; justify-content: space-between; background: #1e293b; padding: 10px 14px; border-radius: 8px; gap: 10px; }
    .status-group { display: flex; align-items: center; gap: 12px; font-size: 13px; }
    .online-badge { background: #059669; color: #fff; padding: 3px 8px; border-radius: 12px; font-weight: 600; font-size: 12px; }
    .status-text { color: #38bdf8; font-weight: 500; }

    .controls { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    select, button { padding: 8px 12px; border-radius: 6px; border: none; font-size: 13px; font-weight: 600; cursor: pointer; outline: none; }
    select { background: #0f172a; color: #f8fafc; border: 1px solid #334155; }
    
    .btn-end { background: #ef4444; color: #fff; }
    .btn-end:hover { background: #dc2626; }
    .btn-next { background: #22c55e; color: #fff; }
    .btn-next:hover { background: #16a34a; }

    /* Main App Layout */
    .app-layout { display: flex; flex: 1; gap: 12px; overflow: hidden; height: calc(100vh - 75px); }
    
    /* Video Grid Section */
    .video-section { flex: 1; display: flex; flex-direction: column; gap: 10px; overflow-y: auto; align-items: center; justify-content: center; background: #020617; border-radius: 8px; padding: 10px; }
    .video-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 100%; max-width: 1100px; }
    
    .video-card { position: relative; background: #0f172a; border-radius: 8px; overflow: hidden; display: flex; align-items: center; justify-content: center; aspect-ratio: 16 / 9; width: 100%; transition: aspect-ratio 0.2s ease; }
    video { width: 100%; height: 100%; object-fit: cover; } /* Avoid stretching aspect ratios */
    .video-label { position: absolute; top: 8px; left: 8px; background: rgba(0,0,0,0.65); padding: 3px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; z-index: 2; }

    /* Chat Section */
    .chat-section { width: 320px; max-width: 100%; background: #1e293b; border-radius: 8px; display: flex; flex-direction: column; padding: 10px; gap: 8px; flex-shrink: 0; }
    .chat-header { font-size: 14px; font-weight: 600; border-bottom: 1px solid #334155; padding-bottom: 6px; display: flex; justify-content: space-between; align-items: center; }
    
    .chat-messages { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; padding-right: 4px; }
    .msg { padding: 8px 10px; border-radius: 6px; font-size: 13px; max-width: 85%; word-break: break-word; line-height: 1.4; }
    .msg.me { background: #2563eb; align-self: flex-end; }
    .msg.them { background: #334155; align-self: flex-start; }
    .msg.system { background: transparent; color: #94a3b8; align-self: center; font-size: 11px; font-style: italic; text-align: center; }
    
    /* Image in Chat */
    .msg img { max-width: 100%; max-height: 180px; border-radius: 6px; display: block; margin-top: 4px; object-fit: contain; cursor: pointer; }

    .typing-status { font-size: 11px; color: #38bdf8; font-style: italic; min-height: 16px; }

    /* Chat Controls */
    .chat-input-bar { display: flex; gap: 6px; align-items: center; }
    .chat-input-bar input[type="text"] { flex: 1; padding: 8px 10px; border-radius: 6px; border: 1px solid #334155; background: #0f172a; color: #fff; font-size: 13px; outline: none; }
    .btn-img { background: #334155; color: #fff; border: none; padding: 8px; border-radius: 6px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
    .btn-img:hover { background: #475569; }
    .btn-send { background: #2563eb; color: #fff; }

    /* Responsive Breakdown for Tablets/Phones */
    @media (max-width: 820px) {
      .app-layout { flex-direction: column; height: auto; overflow: visible; }
      .video-grid { grid-template-columns: 1fr; }
      .chat-section { width: 100%; height: 380px; }
    }
  </style>
</head>
<body>

  <header>
    <div class="status-group">
      <span class="online-badge">🟢 Online: <span id="online-count">1</span></span>
      <span id="status" class="status-text">Starting camera...</span>
    </div>

    <div class="controls">
      <label for="aspect-select" style="font-size: 12px; color: #94a3b8;">Aspect Ratio:</label>
      <select id="aspect-select">
        <option value="16 / 9" selected>16:9</option>
        <option value="4 / 3">4:3</option>
        <option value="21 / 9">21:9</option>
      </select>

      <button id="end-btn" class="btn-end" disabled>End Chat</button>
      <button id="next-btn" class="btn-next">Next Stranger ➔</button>
    </div>
  </header>

  <div class="app-layout">
    <div class="video-section">
      <div class="video-grid">
        <div class="video-card">
          <span class="video-label">You</span>
          <video id="local-video" autoplay muted playsinline></video>
        </div>
        <div class="video-card">
          <span class="video-label">Stranger</span>
          <video id="remote-video" autoplay playsinline></video>
        </div>
      </div>
    </div>

    <div class="chat-section">
      <div class="chat-header">
        <span>Chat Room</span>
      </div>
      <div id="messages" class="chat-messages"></div>
      <div id="typing-indicator" class="typing-status"></div>
      
      <div class="chat-input-bar">
        <input type="file" id="img-input" accept="image/*" hidden>
        <button id="img-btn" class="btn-img" title="Send Image" disabled>📷</button>
        <input type="text" id="msg-input" placeholder="Type a message..." disabled>
        <button id="send-btn" class="btn-send" disabled>Send</button>
      </div>
    </div>
  </div>

  <script>
    const MATCH_TOPIC = 'global-random-chat-v2/matchmaker';
    const PRESENCE_TOPIC = 'global-random-chat-v2/presence';

    let localStream = null;
    let peer = null;
    let myId = null;
    let mqttClient = null;
    let activeCall = null;
    let activeConn = null;
    let isConnected = false;
    let typingTimeout = null;
    const onlinePeers = new Map();

    // DOM Elements
    const statusEl = document.getElementById('status');
    const onlineCountEl = document.getElementById('online-count');
    const localVideo = document.getElementById('local-video');
    const remoteVideo = document.getElementById('remote-video');
    const messagesEl = document.getElementById('messages');
    const typingIndicator = document.getElementById('typing-indicator');
    const msgInput = document.getElementById('msg-input');
    const sendBtn = document.getElementById('send-btn');
    const imgBtn = document.getElementById('img-btn');
    const imgInput = document.getElementById('img-input');
    const nextBtn = document.getElementById('next-btn');
    const endBtn = document.getElementById('end-btn');
    const aspectSelect = document.getElementById('aspect-select');

    // 1. Media Initialization
    async function initCamera() {
      try {
        localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
        localVideo.srcObject = localStream;
        initPeer();
      } catch (err) {
        console.error(err);
        statusEl.textContent = 'Camera blocked! HTTPS required.';
        appendSystemMessage('Camera/Microphone permissions were denied or unavailable.');
      }
    }

    // 2. Setup WebRTC PeerJS
    function initPeer() {
      statusEl.textContent = 'Connecting network...';
      peer = new Peer();

      peer.on('open', id => {
        myId = id;
        initMQTT();
      });

      peer.on('call', call => {
        if (isConnected) return call.close();
        acceptIncomingCall(call);
      });

      peer.on('connection', conn => {
        if (isConnected && activeConn !== conn) return;
        setupDataConnection(conn);
      });

      peer.on('error', err => console.error('Peer error:', err));
    }

    // 3. Setup MQTT Matchmaker & Presence Counter
    function initMQTT() {
      mqttClient = mqtt.connect('wss://broker.hivemq.com:8884/mqtt');

      mqttClient.on('connect', () => {
        mqttClient.subscribe(MATCH_TOPIC);
        mqttClient.subscribe(PRESENCE_TOPIC);

        // Heartbeat presence system
        setInterval(() => {
          if (mqttClient && mqttClient.connected && myId) {
            mqttClient.publish(PRESENCE_TOPIC, myId);
          }
          // Clear expired online users (>6s inactive)
          const now = Date.now();
          for (let [id, lastSeen] of onlinePeers.entries()) {
            if (now - lastSeen > 6000) onlinePeers.delete(id);
          }
          onlineCountEl.textContent = Math.max(1, onlinePeers.size);
        }, 3000);

        findMatch();
      });

      mqttClient.on('message', (topic, message) => {
        const payload = message.toString();

        if (topic === PRESENCE_TOPIC) {
          onlinePeers.set(payload, Date.now());
          onlineCountEl.textContent = Math.max(1, onlinePeers.size);
        } else if (topic === MATCH_TOPIC && !isConnected) {
          try {
            const data = JSON.parse(payload);
            if (data.action === 'looking' && data.id !== myId) {
              connectToStranger(data.id);
            }
          } catch (e) {}
        }
      });
    }

    // 4. Matchmaking & Peer Connection
    function findMatch() {
      disconnectCurrent();
      statusEl.textContent = 'Searching for someone...';
      appendSystemMessage('Searching for a stranger...');
      
      if (mqttClient && mqttClient.connected) {
        mqttClient.publish(MATCH_TOPIC, JSON.stringify({ action: 'looking', id: myId }));
      }
    }

    function connectToStranger(targetId) {
      if (isConnected) return;
      isConnected = true;
      statusEl.textContent = 'Connecting...';

      const conn = peer.connect(targetId);
      setupDataConnection(conn);

      const call = peer.call(targetId, localStream);
      setupCall(call);
    }

    function acceptIncomingCall(call) {
      isConnected = true;
      call.answer(localStream);
      setupCall(call);
    }

    function setupCall(call) {
      activeCall = call;
      call.on('stream', stream => {
        remoteVideo.srcObject = stream;
        statusEl.textContent = 'Connected!';
        appendSystemMessage('Connected to a stranger.');
        toggleChatInputs(true);
      });
      call.on('close', () => resetPeerState('Stranger disconnected.'));
      call.on('error', () => resetPeerState('Call connection failed.'));
    }

    function setupDataConnection(conn) {
      activeConn = conn;
      conn.on('data', data => handleIncomingData(data));
      conn.on('close', () => resetPeerState('Stranger left chat.'));
    }

    // 5. Data & Messaging Handlers
    function handleIncomingData(data) {
      if (typeof data === 'object') {
        if (data.type === 'text') {
          appendMessage(data.content, 'them');
        } else if (data.type === 'img') {
          appendImage(data.data, 'them');
        } else if (data.type === 'typing') {
          typingIndicator.textContent = data.isTyping ? 'Stranger is typing...' : '';
        }
      }
    }

    function sendMessage() {
      const text = msgInput.value.trim();
      if (!text || !activeConn || !isConnected) return;
      
      activeConn.send({ type: 'text', content: text });
      appendMessage(text, 'me');
      msgInput.value = '';
      sendTypingSignal(false);
    }

    // Typing Event Handler
    msgInput.addEventListener('input', () => {
      if (!activeConn || !isConnected) return;
      sendTypingSignal(true);
      clearTimeout(typingTimeout);
      typingTimeout = setTimeout(() => sendTypingSignal(false), 1500);
    });

    function sendTypingSignal(isTyping) {
      if (activeConn && isConnected) {
        activeConn.send({ type: 'typing', isTyping });
      }
    }

    // Image Upload & Compression Handler
    imgBtn.addEventListener('click', () => imgInput.click());
    
    imgInput.addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (!file || !activeConn || !isConnected) return;

      const reader = new FileReader();
      reader.onload = (event) => {
        const img = new Image();
        img.src = event.target.result;
        img.onload = () => {
          // Compress Image via Canvas
          const canvas = document.createElement('canvas');
          const maxDim = 800;
          let w = img.width, h = img.height;
          if (w > maxDim || h > maxDim) {
            if (w > h) { h = Math.round((h * maxDim) / w); w = maxDim; }
            else { w = Math.round((w * maxDim) / h); h = maxDim; }
          }
          canvas.width = w; canvas.height = h;
          const ctx = canvas.getContext('2d');
          ctx.drawImage(img, 0, 0, w, h);
          
          const compressedBase64 = canvas.toDataURL('image/jpeg', 0.7);
          activeConn.send({ type: 'img', data: compressedBase64 });
          appendImage(compressedBase64, 'me');
        };
      };
      reader.readAsDataURL(file);
      imgInput.value = '';
    });

    // 6. Utility UI Actions
    nextBtn.addEventListener('click', findMatch);

    endBtn.addEventListener('click', () => {
      disconnectCurrent();
      statusEl.textContent = 'Chat ended.';
      appendSystemMessage('You ended the chat. Click Next Stranger to connect again.');
    });

    sendBtn.addEventListener('click', sendMessage);
    msgInput.addEventListener('keypress', e => { if (e.key === 'Enter') sendMessage(); });

    // Aspect Ratio Selector
    aspectSelect.addEventListener('change', (e) => {
      const selectedRatio = e.target.value;
      document.querySelectorAll('.video-card').forEach(card => {
        card.style.aspectRatio = selectedRatio;
      });
    });

    function disconnectCurrent() {
      if (activeCall) activeCall.close();
      if (activeConn) activeConn.close();
      activeCall = null;
      activeConn = null;
      isConnected = false;
      remoteVideo.srcObject = null;
      messagesEl.innerHTML = '';
      typingIndicator.textContent = '';
      toggleChatInputs(false);
    }

    function resetPeerState(reason) {
      if (isConnected) {
        appendSystemMessage(reason);
        statusEl.textContent = 'Disconnected';
        toggleChatInputs(false);
        isConnected = false;
      }
    }

    function toggleChatInputs(enabled) {
      msgInput.disabled = !enabled;
      sendBtn.disabled = !enabled;
      imgBtn.disabled = !enabled;
      endBtn.disabled = !enabled;
    }

    function appendMessage(text, sender) {
      const div = document.createElement('div');
      div.className = `message ${sender}`;
      div.textContent = text;
      messagesEl.appendChild(div);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function appendImage(dataUrl, sender) {
      const div = document.createElement('div');
      div.className = `message ${sender}`;
      const img = document.createElement('img');
      img.src = dataUrl;
      div.appendChild(img);
      messagesEl.appendChild(div);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function appendSystemMessage(text) {
      const div = document.createElement('div');
      div.className = 'msg system';
      div.textContent = text;
      messagesEl.appendChild(div);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    // Initialize App
    initCamera();
  </script>
</body>
</html>
